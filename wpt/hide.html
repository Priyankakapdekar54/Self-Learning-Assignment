<!-- 4. Write a jQuery program to hide all headings on a page when they are clicked. o Also
find the position of the mouse pointer relative to the left and top edges of the
document -->
<!doctype html>
<html>
  <head>
    <title>Hide Headings and Mouse Position</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
      $(document).ready(function () {
        // Hide heading when clicked
        $("h1,h2,h3,h4,h5,h6").click(function () {
          $(this).hide();
        });

        // Show mouse pointer position
        $(document).mousemove(function (e) {
          $("#result").text("Left: " + e.pageX + " Top: " + e.pageY);
        });
      });
    </script>
  </head>

  <body>
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>

    <p id="result"></p>
  </body>
</html>
