<!doctype html>
<html>
  <head>
    <title>Video and Audio Example</title>
  </head>
  <body>
    <h2>YouTube Video using iframe</h2>

    <!-- YouTube Video -->
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/dQw4w9WgXcQ"
      title="YouTube video"
      frameborder="0"
      allowfullscreen
    >
    </iframe>

    <hr />

    <h2>HTML5 Video with Controls</h2>

    <!-- Local Video -->
    <video width="400" controls>
      <source src="samplevideo.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>

    <hr />

    <h2>HTML5 Audio with Controls</h2>

    <!-- Local Audio -->
    <audio controls>
      <source src="sampleaudio.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>
  </body>
</html>
